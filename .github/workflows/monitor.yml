name: IMT Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore last hash
        uses: actions/cache@v4
        with:
          path: last-hash.txt
          key: imt-last-hash

      - name: Run check
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node src/check.mjs

      - name: Save last hash
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last-hash.txt
          key: imt-last-hash
